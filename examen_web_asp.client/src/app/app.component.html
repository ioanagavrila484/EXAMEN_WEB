<h1>🔐 Login Examen</h1>

<!-- ============ FORMULAR DE LOGIN (se vede doar cand NU esti logat) ============ -->
<div class="login-container" *ngIf="!loggedInUser">
  <h2>Login</h2>

  <!-- (ngSubmit) apeleaza metoda login() din app.component.ts -->
  <form (ngSubmit)="login()">
    <div class="form-group">
      <label for="username">Nume utilizator</label>
      <!-- [(ngModel)] leaga input-ul de proprietatea 'username' din .ts -->
      <input id="username"
             name="username"
             type="text"
             placeholder="Introdu numele (ex: Ioana Gavrila)"
             [(ngModel)]="username"
             required />
    </div>

    <button type="submit" class="btn btn-primary">Login</button>
  </form>

  <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
</div>

<!-- ============ DUPA LOGIN (se vede doar cand esti logat) ============ -->
<div class="dashboard" *ngIf="loggedInUser">
  <p>👋 Bun venit, <strong>{{ loggedInUser.userName }}</strong> (ID: {{ loggedInUser.id }})</p>
</div>
